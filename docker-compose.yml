services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: tjee1234
      MYSQL_DATABASE: ticketflow
      MYSQL_USER: root
      MYSQL_PASSWORD: tjee1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.19.3
    container_name: elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: kibana:8.19.3
    container_name: kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  spring-boot-app:
    build: .
    container_name: ticketflow-backend
    restart: always
    # 호스트(내 PC)를 가리키는 설정 추가
    extra_hosts:
      - "localhost:host-gateway"
    ports:
      - "8080:8080"
    environment:
      # 이제 jdbc:mysql://localhost:3307/ 으로 접근하면 호스트의 MySQL로 연결됩니다
      - SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/ticketflow?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=tjee1234
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  mysql-data:
  es-data: