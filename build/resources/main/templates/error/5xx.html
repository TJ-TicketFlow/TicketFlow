<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>서버 오류 - 티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<div class="content-wrap" style="text-align:center;padding:80px 20px;">
    <h2>서버 오류가 발생했습니다</h2>
    <p th:text="${errorMessage} ?: '잠시 후 다시 시도해주세요.'">잠시 후 다시 시도해주세요.</p>
    <a th:href="@{/}" class="btn-login" style="display:inline-block;margin-top:24px;text-decoration:none;">홈으로 돌아가기</a>
</div>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
