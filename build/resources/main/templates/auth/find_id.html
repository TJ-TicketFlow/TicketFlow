<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디 찾기 - 티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<div class="content-wrap">
    <div class="card">

        <!-- 입력 단계 -->
        <th:block th:if="${step == 'input'}">
            <h1>아이디 찾기</h1>
            <p class="desc">입력하신 이름과 이메일 주소가 회원 정보와<br>일치한 경우 인증번호가 발송돼요.</p>
            <form th:action="@{/find-id/verify}" method="post">
                    <div class="field"><input type="text" name="name" placeholder="이름" required></div>
                <div class="field"><input type="email" name="email" placeholder="이메일 주소" required></div>
                <button type="submit" class="btn btn-primary">인증번호 받기</button>
            </form>
        </th:block>

        <!-- 인증 단계 -->
        <th:block th:if="${step == 'verify'}">
            <h1>아이디 찾기 - 인증</h1>
            <p class="desc">입력하신 이메일로 인증번호를 발송했어요.<br>인증번호를 입력해 주세요.</p>
            <form th:action="@{/find-id/result}" method="post">
                    <input type="hidden" name="name" th:value="${name}">
                <input type="hidden" name="email" th:value="${email}">
                <div class="field">
                    <input type="text" name="code" placeholder="인증번호 (6자리)" maxlength="6" required>
                    <div class="timer-row">
                        <span class="timer" id="timer">02:59</span>
                        <a class="resend" href="#">인증번호 재발송</a>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">다음</button>
            </form>
        </th:block>

        <!-- 결과 단계 -->
        <th:block th:if="${step == 'result'}">
            <h1>아이디 찾기 결과</h1>
            <p class="desc" style="margin-bottom:24px;">회원님의 아이디는 아래와 같습니다.</p>
            <div class="result-box">
                <span class="result-label">아이디</span>
                <span class="result-value" th:text="${foundId}"></span>
            </div>
            <a th:href="@{/login}" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;">
                로그인 하기
            </a>
        </th:block>

        <div class="back-link-wrap">
            <a th:href="@{/login}">← 로그인으로 돌아가기</a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<th:block th:if="${step == 'verify'}">
<script>
let secs = 179;
const el = document.getElementById('timer');
const iv = setInterval(() => {
    if (secs <= 0) { clearInterval(iv); el.textContent = '00:00'; return; }
    secs--;
    const m = String(Math.floor(secs / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    el.textContent = `${m}:${s}`;
}, 1000);
</script>
</th:block>
</body>
</html>
