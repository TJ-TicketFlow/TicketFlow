<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<div class="content-wrap">
    <div class="card card-wide">
        <div style="text-align:center;margin-bottom:28px;">
            <img th:src="@{/images/header-logo.png}" alt="티켓플로우" style="width:150px;object-fit:contain;">
        </div>
        <h1>회원가입</h1>
        <p class="subtitle">회원 정보를 입력하고 가입해주세요.</p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="field">
                <label>아이디</label>
                <div class="input-wrap">
                    <svg class="icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" th:field="*{userId}" placeholder="아이디를 입력하세요."
                           th:classappend="${#fields.hasErrors('userId')} ? 'input-error'">
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></span>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <div class="input-wrap">
                    <svg class="icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" th:field="*{password}" id="pw" placeholder="비밀번호를 입력하세요."
                           th:classappend="${#fields.hasErrors('password')} ? 'input-error'">
                    <button type="button" class="eye-btn" onclick="togglePw()">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <p class="hint">8자 이상, 영문·숫자·특수문자를 포함해주세요.</p>
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="field">
                <label>메일 주소</label>
                <div class="input-wrap">
                    <svg class="icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input type="email" th:field="*{email}" placeholder="이메일 주소를 입력하세요." style="padding-right:90px;"
                           th:classappend="${#fields.hasErrors('email')} ? 'input-error'">
                    <button type="button" class="suffix-btn">이메일 인증</button>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="field">
                <label>이름</label>
                <div class="input-wrap">
                    <svg class="icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" th:field="*{name}" placeholder="이름을 입력하세요."
                           th:classappend="${#fields.hasErrors('name')} ? 'input-error'">
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>

            <div class="field">
                <label>생년월일</label>
                <div class="input-wrap">
                    <svg class="icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <input type="text" th:field="*{birth}" placeholder="YYYY-MM-DD 형식으로 입력하세요.">
                </div>
            </div>

            <div class="field">
                <label>성별</label>
                <div class="gender-row">
                    <div class="gender-option">
                        <input type="radio" id="gender-male" th:field="*{gender}" value="male">
                        <label for="gender-male">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <circle cx="10" cy="14" r="5"/><path d="m19 5-5.5 5.5M19 5h-5M19 5v5"/>
                            </svg>
                            남성
                        </label>
                    </div>
                    <div class="gender-option">
                        <input type="radio" id="gender-female" th:field="*{gender}" value="female">
                        <label for="gender-female">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <circle cx="12" cy="9" r="5"/><line x1="12" y1="14" x2="12" y2="22"/><line x1="9" y1="19" x2="15" y2="19"/>
                            </svg>
                            여성
                        </label>
                    </div>
                    <div class="gender-option">
                        <input type="radio" id="gender-none" th:field="*{gender}" value="none">
                        <label for="gender-none">선택 안함</label>
                    </div>
                </div>
            </div>

            <div class="field">
                <label>주소</label>
                <div class="addr-grid">
                    <div class="input-wrap" style="flex:1;">
                        <svg class="icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                        <input type="text" th:field="*{zipcode}" placeholder="우편번호를 입력하세요." style="padding-right:90px;">
                        <button type="button" class="suffix-btn">우편번호 찾기</button>
                    </div>
                </div>
                <input type="text" th:field="*{address}" placeholder="기본주소를 입력하세요." class="addr-input">
                <input type="text" th:field="*{addressDetail}" placeholder="상세주소를 입력하세요. (선택사항)" class="addr-input">
            </div>

            <div class="field">
                <label>전화번호</label>
                <div class="phone-row">
                    <select th:field="*{phonePrefix}">
                        <option>010</option>
                        <option>011</option>
                        <option>016</option>
                        <option>017</option>
                        <option>019</option>
                    </select>
                    <span class="phone-sep">-</span>
                    <input type="text" th:field="*{phoneMid}" placeholder="1234" maxlength="4">
                    <span class="phone-sep">-</span>
                    <input type="text" th:field="*{phoneEnd}" placeholder="5678" maxlength="4">
                </div>
            </div>

            <button type="submit" class="btn-submit">회원가입</button>
        </form>
        <p class="login-link">이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a></p>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
function togglePw() {
    const pw = document.getElementById('pw');
    pw.type = pw.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
