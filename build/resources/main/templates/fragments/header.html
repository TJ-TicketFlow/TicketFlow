<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="header">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: '티켓플로우'">티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <th:block th:replace="${extraCss} ?: _"></th:block>
</head>
<body>
<nav class="navbar">
    <div class="navbar-inner">
        <a th:href="@{/}" class="nav-logo">
            <img th:src="@{/images/header-logo.png}" alt="티켓플로우" class="logo-img">
        </a>
        <form th:action="@{/search}" method="get" class="search-bar" role="search">
            <svg width="17" height="17" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" name="keyword" th:value="${keyword}"
                   placeholder="원하는 공연, 스포츠, 전시를 검색해보세요!"
                   autocomplete="off">
            <button type="submit" style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;flex-shrink:0;">
                <svg width="17" height="17" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
        </form>
        <div class="nav-actions">
            <!-- 로그인 상태 -->
            <th:block sec:authorize="isAuthenticated()">
                <a th:href="@{/logout}" class="nav-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    로그아웃
                </a>
                <span class="nav-divider"></span>
                <a th:href="@{/mypage}" class="nav-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    마이페이지
                </a>
            </th:block>
            <!-- 비로그인 상태 -->
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="nav-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    로그인
                </a>
                <span class="nav-divider"></span>
                <a th:href="@{/mypage}" class="nav-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    마이페이지
                </a>
            </th:block>
        </div>
    </div>

    <!-- 카테고리 바: 가운데 정렬 + | 구분선 -->
    <div class="category-bar">
        <div class="category-inner">
            <a th:href="@{/}" class="cat-item" th:classappend="${genre == null} ? ' active'">전체</a>
            <span class="cat-sep">|</span>
            <a th:href="@{/?genre=ranking}" class="cat-item" th:classappend="${genre == 'ranking'} ? ' active'">랭킹</a>
            <span class="cat-sep">|</span>
            <a th:href="@{/?genre=ballad}" class="cat-item" th:classappend="${genre == 'ballad'} ? ' active'">일반/발라드</a>
            <span class="cat-sep">|</span>
            <a th:href="@{/?genre=rock}" class="cat-item" th:classappend="${genre == 'rock'} ? ' active'">락/밴드</a>
            <span class="cat-sep">|</span>
            <a th:href="@{/?genre=trot}" class="cat-item" th:classappend="${genre == 'trot'} ? ' active'">트로트</a>
        </div>
    </div>
</nav>
</body>
</html>
