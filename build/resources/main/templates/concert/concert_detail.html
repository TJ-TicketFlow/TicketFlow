<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공연 상세 정보</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="navbar">
    <div class="navbar-inner">
        <a href="/" class="nav-logo">로고</a>
    </div>
</header>

<main class="detail-wrap">
    <div class="detail-grid">
        <div>
            <img th:src="${concert.posterUrl}" alt="공연 포스터" class="detail-poster">
        </div>

        <div>
            <span class="detail-badge" th:text="${concert.category}">장르</span>
            <h1 class="detail-title" th:text="${concert.title}">공연 제목</h1>

            <div class="detail-meta">
                <span th:text="'일시: ' + ${concert.showDate}">일시</span>
                <span th:text="'장소: ' + ${concert.location}">장소</span>
                <span th:text="'가격: ' + ${concert.price} + '원'">가격</span>
            </div>

            <div class="detail-actions">
                <a href="#" class="btn-primary">예매하기</a>

                <button type="button"
                        class="btn-outline btn-wishlist"
                        id="wishButton"
                        th:attr="data-concert-id=${concert.concertId}"
                        onclick="toggleWish(this)">
                    <span id="wishText">찜하기</span>
                </button>
            </div>
        </div>
    </div>
</main>

<script>
    function toggleWish(buttonElement) {
        // 버튼 요소에서 data-concert-id 값을 안전하게 가져옴
        const concertId = buttonElement.getAttribute('data-concert-id');

        fetch('/api/wish/' + concertId, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => {
                if (!response.ok) throw new Error('서버 오류');
                return response.json();
            })
            .then(data => {
                // CSS 클래스를 토글하여 스타일 변경
                buttonElement.classList.toggle('active');

                // 텍스트 변경
                const text = buttonElement.querySelector('#wishText');
                text.innerText = buttonElement.classList.contains('active') ? '찜 완료' : '찜하기';
            })
            .catch(error => {
                console.error('Error:', error);
                alert('찜하기 처리 중 오류가 발생했습니다.');
            });
    }
</script>
</body>
</html>
