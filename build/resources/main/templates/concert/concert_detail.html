<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공연 상세 정보 | 티켓플로우</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="detail-wrap">
    <!-- 1. 공연 제목 영역 -->
    <div class="detail-header">
        <h1 class="detail-title" th:text="${concert.concertName}">공연 제목</h1>
        <p class="concert-genre" th:text="${concert.concertGenre}">콘서트</p>
    </div>

    <div class="detail-grid">
        <!-- 2. 포스터 및 상세 정보 영역 -->
        <div class="info-left">
            <img th:src="${concert.concertPosterUrl}" alt="포스터" class="detail-poster">
            <div class="wish-section" style="margin-top: 10px;">
                <img id="wishIcon" src="/images/notfavicon.png" alt="찜하기" style="cursor:pointer; width: 24px;"
                     th:attr="data-concert-id=${concert.concertId}" onclick="toggleWish(this.getAttribute('data-concert-id'))">
                <span>위시리스트</span>
            </div>
        </div>

        <div class="info-middle">
            <div class="detail-meta">
                <p><strong>장소</strong> <span th:text="${concert.hall.hallName}"></span></p>
                <p><strong>공연기간</strong> <span th:text="${dateRange}"></span></p>
                <p><strong>공연시간</strong> <span th:text="${concert.concertRuntime}"></span></p>
                <p><strong>관람연령</strong> <span th:text="${concert.concertAgeLimit}"></span></p>
                <p><strong>가격</strong> <span th:text="${concert.concertPriceInfo}"></span></p>
                <p><strong>혜택</strong> <span>기본할인 3% <a href="#">내 쿠폰 확인하기</a></span></p>
            </div>
        </div>

        <!-- 3. 캘린더 및 예매 영역 -->
        <div class="booking-right">
            <h3>관람일</h3>
            <div id="calendar"></div> <!-- 여기에 캘린더 라이브러리 연동 -->

            <h3>회차</h3>
            <div class="session-box" th:text="${concert.concertTime}">18:00</div>

            <form th:action="@{/concert/seatmap}" method="get" style="margin-top:20px;">
                <input type="hidden" name="concertId" th:value="${concert.concertId}">
                <button type="submit" class="btn-primary" style="width:100%;">예매하기</button>
            </form>
        </div>
    </div>

    <!-- 통계 및 상세 정보 이미지 -->
    <section class="stats-section" style="margin-top: 40px;">
        <h3>예매자 성별 분포</h3>
        <canvas id="genderDonutChart"></canvas>
        <h3>연령별 예매자 수</h3>
        <canvas id="ageBarChart"></canvas>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    // 좋아요(찜하기) 토글 함수
    function toggleWish(concertId) {
        const icon = document.getElementById('wishIcon');
        const isLiked = icon.src.includes('favicon.png');

        fetch(`/concert/${concertId}/like`, {
            method: isLiked ? 'DELETE' : 'POST'
        })
            .then(response => {
                if (response.ok) {
                    icon.src = isLiked ? '/images/notfavicon.png' : '/images/favicon.png';
                } else if (response.status === 401) {
                    alert('로그인이 필요합니다.');
                } else {
                    alert('요청에 실패했습니다.');
                }
            });
    }
</script>

</body>
</html>
