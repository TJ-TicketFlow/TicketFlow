<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}티켓플로우{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block extra_css %}{% endblock %}
    <style>{% block extra_styles %}{% endblock %}</style>
</head>
<body>
<nav class="navbar">
    <div class="navbar-inner">
        <a href="/" class="nav-logo">
            <img src="{{ url_for('static', filename='images/header-logo.png') }}" alt="티켓플로우" class="logo-img">
        </a>
        <div class="search-bar">
            <svg width="17" height="17" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" placeholder="원하는 공연을 검색해보세요!">
        </div>
        <div class="nav-actions">
            {% if current_user and current_user.is_authenticated %}
                <a href="/logout" class="nav-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    로그아웃
                </a>
                <a href="/mypage" class="nav-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    마이페이지
                </a>
            {% else %}
                <a href="/login" class="nav-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    로그인
                </a>
                <a href="/mypage" class="nav-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    마이페이지
                </a>
            {% endif %}
        </div>
    </div>
    <div class="category-bar">
        <div class="category-inner">
            <a href="#" class="cat-item">전체</a>
            <a href="#" class="cat-item">랭킹</a>
            <a href="#" class="cat-item">재즈/팝</a>
            <a href="#" class="cat-item">발라드/R&B</a>
            <a href="#" class="cat-item">록/메탈</a>
            <a href="#" class="cat-item">인디/어쿠스틱</a>
            <a href="#" class="cat-item">힙합/랩</a>
            <a href="#" class="cat-item">기타 대중음악</a>
        </div>
    </div>
</nav>
{% block content %}{% endblock %}
