<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>좌석 선택</title>

    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/infopopup.css">
    <link rel="stylesheet" href="/css/selectedSeat.css">

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div class="main-layout">

    <div class="popup">
        <div class="title" id="concert-name">공연명 기본값</div>
        <img class="poster" id="concert-poster" src="" alt="공연 포스터">
        <div class="info-box">
            <div class="info-item">
                <div class="label">공연날짜</div>
                <div class="value" id="concert-date">날짜 로딩 중...</div>
            </div>
            <div class="info-item">
                <div class="label">시작시간</div>
                <div class="value" id="concert-runtime">시간 로딩 중...</div>
            </div>
        </div>
    </div>

    <div class="seat-page">
        <div id="seat-container">
        </div>
    </div>

    <div class="popup-box right-sidebar">
        <div class="selection-title">선택한 좌석</div>

        <div class="selected-seats-list" id="selected-seats-display">
            <span class="no-seat-msg">좌석을 선택해 주세요. (최대 4개)</span>
        </div>

        <div class="price-box" style="margin: 20px 0; padding-top: 15px; border-top: 1px dashed #e2e8f0; display: flex; justify-content: space-between; align-items: center; font-weight: bold; width: 100%;">
            <span style="color: #64748b; font-size: 14px; white-space: nowrap; flex-shrink: 0;">결제 예정 금액</span>
            <span id="total-price-display" style="color: #3b82f6; font-size: 20px; white-space: nowrap; flex-shrink: 0; margin-left: 10px;">0원</span>
        </div>

        <button id="next-booking-btn" onclick="submitBooking()">예매하기</button>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>

<script src="/js/seatprice.js"></script>
<script src="/js/seatmap.js"></script>

</body>

</html>
