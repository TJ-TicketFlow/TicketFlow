<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TicketFlow - 공연 예매</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .filter-wrap { text-align: center; margin: 30px 0; }
        .btn-filter { padding: 10px 24px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; border-radius: 20px; font-weight: 600; color: var(--text-sub); transition: all 0.2s; margin: 0 5px; }
        .btn-filter.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-filter:hover { border-color: var(--primary); color: var(--primary); }
        .btn-filter.active:hover { color: white; }

        /* 추가된 안내 문구 스타일 */
        .empty-message { text-align: center; padding: 60px 0; color: #999; font-size: 1.1rem; }

        .recommendation-section { margin-top: 80px; padding: 40px; background: #ffffff; border-top: 1px solid #eee; }
        .concert-cards-small { display: flex; justify-content: flex-start; gap: 24px; margin-top: 20px; }

        .small-card { width: calc(33.333% - 16px); background: #fff; padding: 20px; border-radius: 28px; text-align: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .small-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .small-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 20px; margin-bottom: 16px; }
        .small-card .concert-name { font-size: 16px; font-weight: 700; color: #333; margin: 12px 0 8px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .concert-meta { font-size: 13px; color: #777; line-height: 1.5; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<main class="main-wrap">
    <div class="main-inner">
        <section class="concert-section">
            <h2 class="section-heading">
        <span th:text="${genre != null} ? ${#strings.replace(genre, 'jazz', '재즈/팝').replace('ballad', '발라드/R&B').replace('rock', '록/메탈').replace('indie', '인디/어쿠스틱').replace('hiphop', '힙합/랩').replace('etc', '기타 대중음악')} + ' 공연 목록' : '전체 공연 목록'">
        </span>
            </h2>

            <div class="filter-wrap">
                <button type="button" class="btn-filter active" onclick="filterConcerts('upcoming', this)">진행 예정 공연</button>
                <button type="button" class="btn-filter" onclick="filterConcerts('past', this)">지난 공연</button>
            </div>

            <div class="concert-grid" id="upcoming-list">
                <article class="concert-card" th:each="concert : ${upcomingConcerts}" th:if="${not #lists.isEmpty(upcomingConcerts)}">
                    <a th:href="@{/concert/{id}/detail-page(id=${concert.concertId})}">
                        <div class="poster-wrap"><img th:src="${concert.concertPosterUrl}" alt="포스터" class="poster-img"></div>
                        <div class="concert-info">
                            <p class="concert-genre" th:text="${concert.concertGenre}">장르</p>
                            <h3 class="concert-name" th:text="${concert.concertName}">공연명</h3>
                            <p class="concert-date" th:text="${concert.concertStartDate} + ' ~ ' + ${concert.concertEndDate}">날짜</p>
                            <p class="concert-hall" th:text="${concert.hall.hallName}">공연장</p>
                        </div>
                    </a>
                </article>
                <div class="empty-message" th:if="${#lists.isEmpty(upcomingConcerts)}" style="width: 100%; text-align: center; padding: 40px;">
                    진행 예정 공연이 없습니다.
                </div>
            </div>

            <div class="concert-grid" id="past-list" style="display: none;">
                <article class="concert-card" th:each="concert : ${pastConcerts}" th:if="${not #lists.isEmpty(pastConcerts)}">
                    <a th:href="@{/concert/{id}/detail-page(id=${concert.concertId})}">
                        <div class="poster-wrap"><img th:src="${concert.concertPosterUrl}" alt="포스터" class="poster-img"></div>
                        <div class="concert-info">
                            <p class="concert-genre" th:text="${concert.concertGenre}">장르</p>
                            <h3 class="concert-name" th:text="${concert.concertName}">공연명</h3>
                            <p class="concert-date" th:text="${concert.concertStartDate} + ' ~ ' + ${concert.concertEndDate}">날짜</p>
                            <p class="concert-hall" th:text="${concert.hall.hallName}">공연장</p>
                        </div>
                    </a>
                </article>
                <div class="empty-message" th:if="${#lists.isEmpty(pastConcerts)}" style="width: 100%; text-align: center; padding: 40px;">
                    지난 공연 기록이 없습니다.
                </div>
            </div>
        </section>

        <section class="recommendation-section">
            <h2 class="section-heading">이런 공연은 어떠신가요?</h2>
            <div id="recommended-list" class="concert-cards-small"></div>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<div id="data-store" th:data-is-logged-in="${isLoggedIn}" style="display:none;"></div>

<script th:src="@{/js/concert/mainpage.js}"></script>

</body>
</html>
