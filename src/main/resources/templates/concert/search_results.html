<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>검색 결과 - 티켓플로우</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <style>
    .search-container { display: flex; gap: 40px; padding: 40px 0; }
    .filter-sidebar { width: 220px; flex-shrink: 0; }
    .content-area { flex: 1; }
    .filter-box { border: 1px solid var(--border); padding: 20px; border-radius: 12px; background: #fff; }
    .filter-group { margin-bottom: 20px; }
    .filter-group label { font-weight: 700; display: block; margin-bottom: 8px; }
    .filter-select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
    .empty-msg { padding: 100px 0; text-align: center; color: var(--text-sub); }
  </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="main-wrap">
  <div class="main-inner">
    <h2 class="section-heading">'<span th:text="${keyword}"></span>' 검색 결과</h2>

    <div class="search-container">
      <aside class="filter-sidebar">
        <div class="filter-box">
          <h3>필터</h3>
          <div class="filter-group">
            <label>상태</label>
            <select id="statusFilter" class="filter-select" onchange="applyFilters()">
              <option value="all">전체</option>
              <option value="upcoming">공연 예정</option>
              <option value="past">지난 공연</option>
            </select>
          </div>
          <div class="filter-group">
            <label>장르</label>
            <select id="genreFilter" class="filter-select" onchange="applyFilters()">
              <option value="all">전체</option>
              <option value="재즈/팝">재즈/팝</option>
              <option value="발라드/R&B">발라드/R&B</option>
              <option value="록/메탈">록/메탈</option>
              <option value="인디/어쿠스틱">인디/어쿠스틱</option>
              <option value="힙합/랩">힙합/랩</option>
            </select>
          </div>
        </div>
      </aside>

      <section class="content-area">
        <div th:if="${#lists.isEmpty(concertList)}" class="empty-msg">
          <p>검색 결과가 없습니다.</p>
        </div>

        <div id="concertGrid" class="concert-grid" th:if="${not #lists.isEmpty(concertList)}">
          <div class="concert-card"
               th:each="concert : ${concertList}"
               th:data-status="${concert.concertEndDate.isBefore(today) ? 'past' : 'upcoming'}"
               th:data-genre="${concert.concertGenre}">
            <a th:href="@{/concert/{id}/detail-page(id=${concert.concertId})}">
              <div class="poster-wrap">
                <img th:src="${concert.concertPosterUrl}" alt="포스터" class="poster-img">
              </div>
              <div class="concert-info">
                <div class="concert-genre" th:text="${concert.concertGenre}">장르</div>
                <div class="concert-name" th:text="${concert.concertName}">공연명</div>
                <div class="concert-date" th:text="${concert.concertStartDate} + ' ~ ' + ${concert.concertEndDate}">날짜</div>
                <div class="concert-hall" th:text="${concert.hall.hallName}">공연장</div>
              </div>
            </a>
          </div>
        </div>
      </section>
    </div>
  </div>
</main>

<script>
  document.addEventListener('DOMContentLoaded', applyFilters);
  function applyFilters() {
    const status = document.getElementById('statusFilter').value;
    const genre = document.getElementById('genreFilter').value;
    document.querySelectorAll('.concert-card').forEach(card => {
      const matchStatus = (status === 'all' || card.dataset.status === status);
      const matchGenre = (genre === 'all' || card.dataset.genre === genre);
      card.style.display = (matchStatus && matchGenre) ? 'block' : 'none';
    });
  }
</script>
</body>
</html>
