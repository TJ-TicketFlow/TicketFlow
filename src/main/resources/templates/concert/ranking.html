<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- 기존 헤더 프래그먼트 유지 -->
<head th:replace="~{fragments/header :: header(pageTitle='공연 랭킹')}">
</head>

<body>
<div class="main-wrap">
    <div class="main-inner">

        <!-- 1. 장르 탭 -->
        <div class="genre-tabs">
            <a th:href="@{/concert/ranking}"
               th:classappend="${genre == 'all' || genre == null} ? 'active' : ''"
               class="tab-link">전체</a>
            <a th:each="g : ${ {'jazz', 'ballad', 'rock', 'indie', 'hiphop', 'etc'} }"
               th:href="@{/concert/ranking(genre=${g})}"
               th:text="${#strings.replace(g, 'jazz', '재즈').replace('ballad', '발라드').replace('rock', '록').replace('indie', '인디').replace('hiphop', '힙합').replace('etc', '기타')}"
               th:classappend="${genre == g} ? 'active' : ''"
               class="tab-link"></a>
        </div>

        <h2 class="section-heading" style="text-align: center; margin-top: 40px;">공연 예매 랭킹</h2>

        <!-- 2. 상위 랭킹 카드 영역 (디자인 고정 적용) -->
        <div th:if="${not #lists.isEmpty(top3)}" class="ranking-grid" style="margin-bottom: 60px;">
            <div th:each="item : ${top3}" class="concert-card">
                <a th:href="@{/concert/{id}/detail-page(id=${item.concert.concertId})}">
                    <!-- 디자인 고정: 이미지 액자 -->
                    <div class="poster-wrap">
                        <img th:src="${item.concert.concertPosterUrl}" alt="포스터" class="poster-img">
                    </div>

                    <div class="concert-info">
                        <div style="font-weight: bold; color: var(--primary); margin-bottom: 5px;" th:text="${item.ranking} + '위'"></div>
                        <h3 class="concert-name" th:text="${item.concert.concertName}"></h3>
                        <div class="concert-date" th:text="${item.concert.concertStartDate} + ' ~ ' + ${item.concert.concertEndDate}"></div>
                        <div class="concert-hall" th:if="${not #lists.isEmpty(item.concert.stats)}">
                            예매율: <span th:text="${item.concert.stats[0].reservationRate} + '%'"></span>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- 3. 일반 리스트 영역 -->
        <div class="concert-section" th:if="${not #lists.isEmpty(restRankings)}">
            <div th:each="item : ${restRankings}" style="border-bottom: 1px solid var(--border); padding: 15px 10px;">
                <a th:href="@{/concert/{id}/detail-page(id=${item.concert.concertId})}" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
                    <div style="width: 50px; font-weight: bold; color: #555;" th:text="${item.ranking} + '위'"></div>
                    <!-- 리스트용 이미지 -->
                    <img th:src="${item.concert.concertPosterUrl}" style="width: 50px; height: 70px; object-fit: cover; margin-right: 20px; border-radius: 3px;">
                    <div style="flex-grow: 1; display: flex; justify-content: space-between; align-items: center;">
                        <h4 style="margin: 0; font-size: 1rem; width: 40%;" th:text="${item.concert.concertName}"></h4>
                        <div style="font-size: 0.85rem; color: #666;" th:text="${item.concert.concertStartDate}"></div>
                        <div style="font-weight: bold; color: var(--primary);" th:if="${not #lists.isEmpty(item.concert.stats)}">
                            <span th:text="${item.concert.stats[0].reservationRate} + '%'"></span>
                        </div>
                    </div>
                </a>
            </div>
        </div>

    </div>
</div>

<!-- 기존 푸터 프래그먼트 유지 -->
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
