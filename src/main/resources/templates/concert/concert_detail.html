<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>공연 상세 정보</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .stats-chart-wrapper { display: flex; gap: 50px; justify-content: center; align-items: center; padding: 20px; background: #f9f9f9; border-radius: 15px; margin-top: 20px; }
        .chart-box { width: 300px; text-align: center; }
        .chart-box canvas { width: 100% !important; height: auto !important; }
        /* 위시리스트 스타일 */
        .wishlist-box { margin-top: 15px; display: flex; align-items: center; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="detail-wrap">
    <div class="detail-grid">
        <div class="info-left">
            <img th:src="${concert.concertPosterUrl}" alt="포스터" class="detail-poster">
            <div class="wishlist-box"
                 th:data-concert-id="${concert.concertId}"
                 onclick="toggleWishlist(this.getAttribute('data-concert-id'))">

                <img th:id="'wish-icon-' + ${concert.concertId}"
                     th:src="${isLiked} ? @{/images/favicon.png} : @{/images/notfavicon.png}"
                     alt="찜" style="width: 24px; margin-right: 8px;">
                <span th:id="'wish-count-' + ${concert.concertId}" th:text="${wishCount}">0</span>
            </div>
        </div>

        <div class="info-middle">
            <h1 class="detail-title" th:text="${concert.concertName}"></h1>
            <div class="detail-meta">
                <p><strong>장소</strong> <span th:text="${concert.hall.hallName}"></span></p>
                <p><strong>공연기간</strong> <span th:text="${dateRange}"></span></p>
                <p><strong>공연시간</strong> <span th:text="${concert.concertTime}"></span></p>
                <p><strong>관람연령</strong> <span th:text="${concert.concertAgeLimit}"></span></p>
                <div class="price-section">
                    <p><strong>가격</strong></p>
                    <div class="price-list">
                        <span th:each="price : ${priceList}" th:text="${price}"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="booking-right">
            <div th:with="isEnded=${concert.concertEndDate < today}">
                <div th:if="${isEnded}" class="sold-out-box" style="border: 2px solid #eee; padding: 30px; text-align: center; border-radius: 15px; background: #fafafa; color: #666;">
                    <h3>판매종료</h3>
                    <button type="button" class="btn-primary" disabled style="background-color: #bbbbbb; width: 100%; padding: 12px; border: none; color: #fff; border-radius: 5px;">예매하기</button>
                </div>
                <div th:unless="${isEnded}">
                    <h3>관람일 선택</h3>
                    <div id="calendar"></div>
                    <h3>회차 선택</h3>
                    <div id="session-container" class="session-wrapper"></div>
                    <form th:action="@{/concert/seatmap}" method="get">
                        <input type="hidden" name="concertId" th:value="${concert.concertId}">
                        <input type="hidden" name="sessionId" id="selectedSessionId">
                        <button type="submit" class="btn-primary">예매하기</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <section class="bottom-section">
        <div class="info-images-section">
            <h3>공연 상세 정보</h3>
            <div th:if="${not #lists.isEmpty(concert.concertInfoImages)}" th:each="imgUrl : ${concert.concertInfoImages}">
                <img th:src="${imgUrl}" alt="상세 정보">
            </div>
        </div>

        <div class="stats-section">
            <h3>예매자 통계</h3>
            <div th:if="${stats != null}" class="stats-chart-wrapper">
                <div class="chart-box"><canvas id="genderChart"></canvas></div>
                <div class="chart-box"><canvas id="ageChart"></canvas></div>
            </div>
            <div th:unless="${stats != null}" class="empty-msg">
                <p>아직 예매 데이터가 없습니다.</p>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    // 위시리스트 토글 로직
    function toggleWishlist(concertId) {
        // 1. 헤더 설정 (CSRF 토큰도 포함)
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        fetch(`/concert/${concertId}/like`, {
            method: 'POST',
            headers: {
                [csrfHeader]: csrfToken,
                'Content-Type': 'application/json' // 필요시 추가
            },
            credentials: 'include' // ★ 이 옵션이 핵심입니다!
        })
            .then(response => {
                if (response.status === 401) {
                    alert("로그인이 필요합니다.");
                    window.location.href = "/login";
                    return null;
                }
                return response.json();
            })
            .then(data => {
                if (!data) return;
                const icon = document.getElementById(`wish-icon-${concertId}`);
                const countSpan = document.getElementById(`wish-count-${concertId}`);

                // 서버 응답에 따라 아이콘 및 숫자 변경
                if (data.isLiked) {
                    icon.src = "/images/favicon.png";
                } else {
                    icon.src = "/images/notfavicon.png";
                }
                countSpan.innerText = data.newCount;
            });
    }

    // 차트 및 기존 로직...
    const stats = /*[[${stats}]]*/ null;
    if (stats) {
        new Chart(document.getElementById('genderChart'), {
            type: 'doughnut',
            data: { labels: ['남성', '여성'], datasets: [{ data: stats.genderData, backgroundColor: ['#3b82f6', '#f43f5e'] }] },
            options: { plugins: { title: { display: true, text: '성별 비율 (%)' }, tooltip: { callbacks: { label: (ctx) => ctx.label + ': ' + ctx.parsed.toFixed(1) + '%' } } } }
        });

        new Chart(document.getElementById('ageChart'), {
            type: 'bar',
            data: { labels: ['10대', '20대', '30대', '40대', '50대'], datasets: [{ label: '연령대별 예매율', data: stats.ageData, backgroundColor: '#3b82f6' }] },
            options: { plugins: { title: { display: true, text: '연령대별 예매율 (%)' }, tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + '%' } } }, scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            locale: 'ko', initialView: 'dayGridMonth', selectable: true,
            dateClick: (info) => loadSessions(info.dateStr)
        });
        calendar.render();
    });

    function loadSessions(date) {
        const concertId = document.querySelector('input[name="concertId"]').value;
        fetch(`/concert/${concertId}/sessions?date=${date}`)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('session-container');
                container.innerHTML = '';
                data.forEach(s => {
                    const btn = document.createElement('button');
                    btn.type = 'button'; btn.className = 'btn-session';
                    btn.innerText = s.time;
                    btn.onclick = () => {
                        document.querySelectorAll('.btn-session').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById('selectedSessionId').value = s.id;
                    };
                    container.appendChild(btn);
                });
            });
    }
</script>
</body>
</html>
