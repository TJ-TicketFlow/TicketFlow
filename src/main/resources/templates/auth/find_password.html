<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - 티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<div class="content-wrap">
    <div class="card">

        <div th:if="${errorMessage}" class="flash-msg" th:text="${errorMessage}"></div>

        <th:block th:if="${step == 'input'}">
            <h1>비밀번호 찾기</h1>
            <p class="desc">가입 시 등록한 아이디와 이메일을 입력하시면<br>인증번호를 발송해 드려요.</p>
            <form th:action="@{/find-password/verify}" method="post">

                <div class="field"><input type="text" name="userId" placeholder="아이디" required></div>
                <div class="field"><input type="email" name="email" placeholder="이메일 주소" required></div>
                <button type="submit" class="btn btn-primary">인증번호 받기</button>
            </form>
        </th:block>

        <th:block th:if="${step == 'verify'}">
            <h1>비밀번호 찾기 - 인증</h1>
            <p class="desc">입력하신 이메일로 인증번호를 발송했어요.</p>
            <form th:action="@{/find-password/reset}" method="post">
                    <input type="hidden" name="userId" th:value="${userId}">
                <input type="hidden" name="email" th:value="${email}">
                <div class="field">
                    <input type="text" name="code" placeholder="인증번호 (6자리)" maxlength="6" required>
                    <div class="timer-row">
                        <span class="timer" id="timer">02:59</span>
                        <button type="submit" form="resendPwForm" class="resend" style="border:none;background:none;padding:0;cursor:pointer;font-family:inherit;">인증번호 재발송</button>
                    </div>
                </div>
                <div class="field">
                    <input type="password" name="newPassword" placeholder="새 비밀번호 (8자 이상)" required minlength="8">
                </div>
                <div class="field">
                    <input type="password" name="confirmPassword" placeholder="새 비밀번호 확인" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary">비밀번호 변경</button>
            </form>
            <!-- 재발송: 입력 단계와 동일한 엔드포인트로 다시 보내 새 인증번호를 발급받음 -->
            <form id="resendPwForm" th:action="@{/find-password/verify}" method="post" style="display:none;">
                <input type="hidden" name="userId" th:value="${userId}">
                <input type="hidden" name="email" th:value="${email}">
            </form>
        </th:block>

        <th:block th:if="${step == 'done'}">
            <h1>비밀번호 변경 완료</h1>
            <p class="desc" style="margin-bottom:24px;">비밀번호가 성공적으로 변경되었습니다.</p>
            <a th:href="@{/login}" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;">
                로그인 하기
            </a>
        </th:block>

        <div class="back-link-wrap">
            <a th:href="@{/login}">← 로그인으로 돌아가기</a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<th:block th:if="${step == 'verify'}">
<script>
let secs = 179;
const el = document.getElementById('timer');
const iv = setInterval(() => {
    if (secs <= 0) { clearInterval(iv); el.textContent = '00:00'; return; }
    secs--;
    const m = String(Math.floor(secs / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    el.textContent = `${m}:${s}`;
}, 1000);
</script>
</th:block>
</body>
</html>
