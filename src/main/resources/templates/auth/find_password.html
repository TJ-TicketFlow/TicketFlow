<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>비밀번호 찾기 - 티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<div class="content-wrap">
    <div class="card">

        <!-- 입력 단계 -->
        <th:block th:if="${step == 'input'}">
            <h1>비밀번호 찾기</h1>
            <p class="desc">가입 시 등록한 아이디와 이메일을 입력하시면<br>인증번호를 발송해 드려요.</p>
            <div th:if="${errorMessage}" class="flash-msg" th:text="${errorMessage}"></div>
            <form th:action="@{/find-password/verify}" method="post">
                <div class="field"><input type="text" name="userId" placeholder="아이디" required></div>
                <div class="field"><input type="email" name="email" placeholder="이메일 주소" required></div>
                <button type="submit" class="btn btn-primary">인증번호 받기</button>
            </form>
        </th:block>

        <!-- 인증 단계 (인증번호만 입력) -->
        <th:block th:if="${step == 'verify'}">
            <h1>비밀번호 찾기 - 인증</h1>
            <p class="desc" id="sendStatus">인증번호 발송 중...</p>
            <div th:if="${errorMessage}" class="flash-msg" th:text="${errorMessage}"></div>
            <form th:action="@{/find-password/confirm-code}" method="post">
                <input type="hidden" name="userId" th:value="${userId}" id="fUserId">
                <input type="hidden" name="email" th:value="${email}" id="fEmail">
                <div class="field">
                    <input type="text" name="code" placeholder="인증번호 (6자리)" maxlength="6" required>
                    <div class="timer-row">
                        <span class="timer" id="timer">03:00</span>
                        <a class="resend" href="#" id="resendLink">인증번호 재발송</a>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">다음</button>
            </form>
        </th:block>

        <!-- 새 비밀번호 입력 단계 (인증 성공 후에만 진입) -->
        <th:block th:if="${step == 'reset'}">
            <h1>새 비밀번호 설정</h1>
            <p class="desc">인증이 완료되었습니다.<br>사용할 새 비밀번호를 입력해 주세요.</p>
            <div th:if="${errorMessage}" class="flash-msg" th:text="${errorMessage}"></div>
            <form th:action="@{/find-password/reset}" method="post">
                <input type="hidden" name="token" th:value="${token}">
                <input type="hidden" name="userId" th:value="${userId}">
                <div class="field">
                    <input type="password" name="newPassword" placeholder="새 비밀번호 (8자 이상)" required>
                </div>
                <div class="field">
                    <input type="password" name="confirmPassword" placeholder="새 비밀번호 확인" required>
                </div>
                <button type="submit" class="btn btn-primary">비밀번호 변경</button>
            </form>
        </th:block>

        <!-- 완료 단계 -->
        <th:block th:if="${step == 'done'}">
            <h1>비밀번호 변경 완료</h1>
            <p class="desc" style="margin-bottom:24px;">비밀번호가 성공적으로 변경되었습니다.</p>
            <a th:href="@{/login}" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;">
                로그인 하기
            </a>
        </th:block>

        <div class="back-link-wrap">
            <a th:href="@{/login}">← 로그인으로 돌아가기</a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<th:block th:if="${step == 'verify'}">
    <script>
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        const userId = document.getElementById('fUserId').value;
        const email = document.getElementById('fEmail').value;
        const statusEl = document.getElementById('sendStatus');
        const timerEl = document.getElementById('timer');

        let secs = 0;
        let timerInterval = null;

        function startTimer() {
            clearInterval(timerInterval);
            secs = 179;
            updateTimerText();
            timerInterval = setInterval(() => {
                if (secs <= 0) { clearInterval(timerInterval); timerEl.textContent = '00:00'; return; }
                secs--;
                updateTimerText();
            }, 1000);
        }

        function updateTimerText() {
            const m = String(Math.floor(secs / 60)).padStart(2, '0');
            const s = String(secs % 60).padStart(2, '0');
            timerEl.textContent = `${m}:${s}`;
        }

        async function sendCode() {
            statusEl.textContent = '인증번호 발송 중...';
            try {
                const res = await fetch('/find-password/send-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        [csrfHeader]: csrfToken
                    },
                    body: new URLSearchParams({ userId, email })
                });
                const data = await res.json();
                if (data.success) {
                    statusEl.textContent = '인증번호가 발송되었습니다. 이메일을 확인해주세요.';
                    startTimer();
                } else {
                    statusEl.textContent = data.message || '인증번호 발송에 실패했습니다.';
                }
            } catch (e) {
                statusEl.textContent = '인증번호 발송에 실패했습니다. 잠시 후 다시 시도해주세요.';
            }
        }

        document.getElementById('resendLink').addEventListener('click', (e) => {
            e.preventDefault();
            sendCode();
        });

        sendCode();
    </script>
</th:block>
</body>
</html>
