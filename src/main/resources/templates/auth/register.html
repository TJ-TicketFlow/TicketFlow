<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 티켓플로우</title>
    <!-- CSRF 메타태그 추가 -->
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<!-- ── 토스트 컨테이너 ── -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ── 아이디 중복확인 모달 ── -->
<div class="modal-overlay" id="idCheckModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('idCheckModal')">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <p class="modal-title">아이디 중복 확인</p>
        <p class="modal-hint" id="idCheckMsg">아이디 사용 가능 여부를 확인합니다.</p>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal('idCheckModal')">닫기</button>
        </div>
    </div>
</div>

<!-- ── 이메일 인증 모달 ── -->
<div class="modal-overlay" id="emailVerifyModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('emailVerifyModal')">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <p class="modal-title">이메일 인증</p>
        <p class="modal-hint" id="emailSentMsg">입력하신 이메일로 인증코드를 발송했습니다.</p>
        <div class="modal-input-row">
            <input type="text" id="verifyCodeInput" placeholder="인증코드 6자리 입력" maxlength="6"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            <span class="verify-timer" id="verifyTimer">3:00</span>
        </div>
        <p class="modal-hint" id="verifyMsg" style="margin-bottom:0;"></p>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="resendCode()">재발송</button>
            <button class="modal-btn modal-btn-ok" onclick="confirmCode()">확인</button>
        </div>
    </div>
</div>

<!-- ── 회원가입 폼 ── -->
<div class="auth-wrap">
    <div class="auth-box">

        <h1 class="auth-title" style="text-align:center;">회원가입</h1>
        <p class="auth-sub" style="text-align:center;">회원 정보를 입력하고 가입해주세요.</p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post"
              id="registerForm" onsubmit="return validateForm()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- 아이디 -->
            <div class="form-group">
                <label>아이디</label>
                <div class="input-row">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" th:field="*{userId}" id="userId"
                           placeholder="아이디를 입력하세요." oninput="resetIdCheck()">
                    <button type="button" class="suffix-btn" id="idCheckBtn" onclick="checkUserId()">중복확인</button>
                </div>
                <p class="field-msg" id="idMsg"></p>
            </div>

            <!-- 비밀번호 -->
            <div class="form-group">
                <label>비밀번호</label>
                <div class="input-row">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="pw" th:field="*{password}"
                           placeholder="비밀번호를 입력하세요." oninput="validatePw()">
                    <button type="button" class="pw-eye" onclick="togglePw('pw','pwEye')">
                        <svg id="pwEye" width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <p class="field-msg" id="pwMsg"></p>
                <p class="form-hint">8자 이상, 영문·숫자·특수문자를 포함해주세요.</p>
            </div>

            <!-- 비밀번호 확인 -->
            <div class="form-group">
                <label>비밀번호 확인</label>
                <div class="input-row">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="pw2"
                           placeholder="비밀번호를 다시 입력하세요." oninput="validatePw2()">
                    <button type="button" class="pw-eye" onclick="togglePw('pw2','pw2Eye')">
                        <svg id="pw2Eye" width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <p class="field-msg" id="pw2Msg"></p>
            </div>

            <!-- 메일 주소 -->
            <div class="form-group">
                <label>메일 주소</label>
                <div class="input-row">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <input type="email" th:field="*{email}" id="email"
                           placeholder="이메일 주소를 입력하세요." oninput="resetEmailVerify()">
                    <button type="button" class="suffix-btn" id="emailVerifyBtn"
                            onclick="sendEmailCode()">이메일 인증</button>
                </div>
                <p class="field-msg" id="emailMsg"></p>
            </div>

            <!-- 이름 -->
            <div class="form-group">
                <label>이름</label>
                <div class="input-row">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" th:field="*{name}" placeholder="이름을 입력하세요.">
                </div>
            </div>

            <!-- 생년월일 -->
            <div class="form-group">
                <label>생년월일</label>
                <div class="input-row">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <input type="text" th:field="*{birth}" id="birthInput"
                           placeholder="YYYY-MM-DD 형식으로 입력하세요."
                           oninput="formatBirth(this)" maxlength="10">
                    <button type="button" class="pw-eye"
                            onclick="document.getElementById('birthPicker').showPicker()">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </button>
                    <input type="date" id="birthPicker" style="display:none;"
                           onchange="document.getElementById('birthInput').value=this.value">
                </div>
            </div>

            <!-- 성별 -->
            <div class="form-group">
                <label>성별</label>
                <div class="gender-row">
                    <label>
                        <input type="radio" th:field="*{gender}" value="male"> 남자
                    </label>
                    <label>
                        <input type="radio" th:field="*{gender}" value="female"> 여자
                    </label>
                </div>
            </div>

            <!-- 주소 -->
            <div class="form-group">
                <label>주소</label>
                <div class="input-row" style="margin-bottom:8px;">
                    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" th:field="*{zipcode}" id="zipcode"
                           placeholder="우편번호를 입력하세요." readonly>
                    <button type="button" class="suffix-btn" onclick="openPostcode()">우편번호 찾기</button>
                </div>
                <input type="text" th:field="*{address}" id="address"
                       placeholder="기본주소를 입력하세요."
                       class="addr-input" style="margin-bottom:8px;" readonly>
                <input type="text" th:field="*{addressDetail}" id="addressDetail"
                       placeholder="상세주소를 입력하세요. (선택사항)" class="addr-input">
            </div>

            <!-- 전화번호 -->
            <div class="form-group">
                <label>전화번호</label>
                <div class="phone-row">
                    <div class="phone-fixed">
                        010
                            <input type="hidden" name="phonePrefix" th:value="'010'">
<!--                        <input type="hidden" th:value="*{phonePrefix}" value="010">-->
                    </div>
                    <span class="phone-sep">-</span>
                    <input type="text" th:field="*{phoneMid}" id="phoneMid"
                           placeholder="1234" maxlength="4" class="phone-input"
                           oninput="this.value=this.value.replace(/\D/g,'')">
                    <span class="phone-sep">-</span>
                    <input type="text" th:field="*{phoneEnd}" id="phoneEnd"
                           placeholder="5678" maxlength="4" class="phone-input"
                           oninput="this.value=this.value.replace(/\D/g,'')">
                </div>
            </div>

            <button type="submit" class="btn-auth" style="margin-top:8px;">회원가입</button>
        </form>

        <div class="auth-links">
            이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<!-- 다음 우편번호 API -->
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script>
    /* ══════════════════════════════════════
       CSRF 토큰 (fetch POST 요청에 사용)
    ══════════════════════════════════════ */
    var csrfToken  = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    var csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    /* ══════════════════════════════════════
       상태 변수
    ══════════════════════════════════════ */
    var idChecked     = false;
    var emailVerified = false;
    var timerInterval = null;
    var timerSeconds  = 180;

    /* ══════════════════════════════════════
       토스트
    ══════════════════════════════════════ */
    function showToast(msg, type) {
        var wrap = document.getElementById('toastWrap');
        var el   = document.createElement('div');
        el.className = 'toast ' + (type || 'info');
        var icons = {
            success: '<polyline points="20 6 9 17 4 12"/>',
            error:   '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
            info:    '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
        };
        el.innerHTML =
            '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">'
            + (icons[type] || icons.info) + '</svg>' + msg;
        wrap.appendChild(el);
        setTimeout(function() { el.classList.add('show'); }, 10);
        setTimeout(function() {
            el.classList.remove('show');
            setTimeout(function() { el.remove(); }, 280);
        }, 2800);
    }

    /* ══════════════════════════════════════
       모달
    ══════════════════════════════════════ */
    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
        overlay.addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('open');
        });
    });

    /* ══════════════════════════════════════
       비밀번호 눈 토글
    ══════════════════════════════════════ */
    function togglePw(inputId, iconId) {
        var input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    /* ══════════════════════════════════════
       비밀번호 유효성 검사
    ══════════════════════════════════════ */
    function validatePw() {
        var val = document.getElementById('pw').value;
        var ok  = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{}|;':",.<>?]).{8,}$/.test(val);
        setMsg('pwMsg', ok ? '사용 가능한 비밀번호입니다.' : '8자 이상, 영문·숫자·특수문자를 포함해야 합니다.', ok);
        validatePw2();
    }
    function validatePw2() {
        var v1 = document.getElementById('pw').value;
        var v2 = document.getElementById('pw2').value;
        if (!v2) { hideMsg('pw2Msg'); return; }
        setMsg('pw2Msg', v1 === v2 ? '비밀번호가 일치합니다.' : '비밀번호가 일치하지 않습니다.', v1 === v2);
    }

    /* ══════════════════════════════════════
       아이디 중복확인 - 서버 API 연동
    ══════════════════════════════════════ */
    function resetIdCheck() {
        idChecked = false;
        var btn = document.getElementById('idCheckBtn');
        btn.classList.remove('verified');
        btn.textContent = '중복확인';
        hideMsg('idMsg');
    }

    function checkUserId() {
        var userId = document.getElementById('userId').value.trim();
        if (!userId) { showToast('아이디를 입력해주세요.', 'error'); return; }
        if (!/^[a-zA-Z0-9]{4,20}$/.test(userId)) {
            showToast('아이디는 4~20자의 영문·숫자만 사용 가능합니다.', 'error'); return;
        }

        fetch('/api/check-userid?userId=' + encodeURIComponent(userId))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var msgEl = document.getElementById('idCheckMsg');
                if (data.duplicated) {
                    msgEl.className = 'modal-hint err';
                    msgEl.textContent = '\'' + userId + '\' 은(는) 이미 사용 중인 아이디입니다.';
                    idChecked = false;
                } else {
                    msgEl.className = 'modal-hint ok';
                    msgEl.textContent = '\'' + userId + '\' 은(는) 사용 가능한 아이디입니다.';
                    idChecked = true;
                    var btn = document.getElementById('idCheckBtn');
                    btn.classList.add('verified');
                    btn.textContent = '확인완료';
                    setMsg('idMsg', '사용 가능한 아이디입니다.', true);
                }
                openModal('idCheckModal');
            })
            .catch(function() { showToast('서버 오류가 발생했습니다.', 'error'); });
    }

    /* ══════════════════════════════════════
       이메일 인증 - 서버 API 연동
    ══════════════════════════════════════ */
    function resetEmailVerify() {
        emailVerified = false;
        var btn = document.getElementById('emailVerifyBtn');
        btn.classList.remove('verified');
        btn.textContent = '이메일 인증';
        hideMsg('emailMsg');
        clearInterval(timerInterval);
    }

    function sendEmailCode() {
        var email = document.getElementById('email').value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showToast('올바른 이메일 주소를 입력해주세요.', 'error'); return;
        }

        var btn = document.getElementById('emailVerifyBtn');
        btn.disabled = true;
        btn.textContent = '발송 중...';

        // CSRF 헤더 추가
        fetch('/register/send-code?email=' + encodeURIComponent(email), {
            method: 'POST',
            headers: { [csrfHeader]: csrfToken }
        })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                btn.disabled = false;
                btn.textContent = '이메일 인증';
                if (data.success) {
                    document.getElementById('emailSentMsg').textContent =
                        email + ' 으로 인증코드를 발송했습니다.';
                    document.getElementById('verifyCodeInput').value = '';
                    var vMsg = document.getElementById('verifyMsg');
                    vMsg.textContent = '';
                    vMsg.className = 'modal-hint';
                    startTimer();
                    openModal('emailVerifyModal');
                    showToast('인증코드를 발송했습니다.', 'info');
                } else {
                    showToast(data.message || '발송 실패. 다시 시도해주세요.', 'error');
                }
            })
            .catch(function() {
                btn.disabled = false;
                btn.textContent = '이메일 인증';
                showToast('서버 오류가 발생했습니다.', 'error');
            });
    }

    function resendCode() {
        var email = document.getElementById('email').value.trim();
        if (!email) { closeModal('emailVerifyModal'); return; }

        // CSRF 헤더 추가
        fetch('/register/send-code?email=' + encodeURIComponent(email), {
            method: 'POST',
            headers: { [csrfHeader]: csrfToken }
        })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var vMsg = document.getElementById('verifyMsg');
                if (data.success) {
                    document.getElementById('verifyCodeInput').value = '';
                    vMsg.className = 'modal-hint ok';
                    vMsg.textContent = '인증코드를 재발송했습니다.';
                    startTimer();
                    showToast('인증코드를 재발송했습니다.', 'info');
                } else {
                    vMsg.className = 'modal-hint err';
                    vMsg.textContent = data.message || '재발송 실패. 다시 시도해주세요.';
                }
            })
            .catch(function() { showToast('서버 오류가 발생했습니다.', 'error'); });
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerSeconds = 180;
        updateTimerDisplay();
        timerInterval = setInterval(function() {
            timerSeconds--;
            updateTimerDisplay();
            if (timerSeconds <= 0) {
                clearInterval(timerInterval);
                var vMsg = document.getElementById('verifyMsg');
                vMsg.className = 'modal-hint err';
                vMsg.textContent = '인증 시간이 만료되었습니다. 재발송해주세요.';
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        var m = String(Math.floor(timerSeconds / 60));
        var s = String(timerSeconds % 60).padStart(2, '0');
        document.getElementById('verifyTimer').textContent = m + ':' + s;
    }

    function confirmCode() {
        var email = document.getElementById('email').value.trim();
        var input = document.getElementById('verifyCodeInput').value.trim();
        var vMsg  = document.getElementById('verifyMsg');

        if (timerSeconds <= 0) {
            vMsg.className = 'modal-hint err';
            vMsg.textContent = '인증 시간이 만료되었습니다. 재발송해주세요.';
            return;
        }
        if (!input) {
            vMsg.className = 'modal-hint err';
            vMsg.textContent = '인증코드를 입력해주세요.';
            return;
        }

        // CSRF 헤더 추가
        fetch('/register/verify-code?email=' + encodeURIComponent(email) +
            '&code=' + encodeURIComponent(input), {
            method: 'POST',
            headers: { [csrfHeader]: csrfToken }
        })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    emailVerified = true;
                    clearInterval(timerInterval);
                    closeModal('emailVerifyModal');
                    var btn = document.getElementById('emailVerifyBtn');
                    btn.classList.add('verified');
                    btn.textContent = '인증완료';
                    setMsg('emailMsg', '이메일 인증이 완료되었습니다.', true);
                    showToast('이메일 인증이 완료되었습니다.', 'success');
                } else {
                    vMsg.className = 'modal-hint err';
                    vMsg.textContent = '인증코드가 올바르지 않습니다. 다시 확인해주세요.';
                }
            })
            .catch(function() { showToast('서버 오류가 발생했습니다.', 'error'); });
    }

    /* ══════════════════════════════════════
       생년월일 자동 하이픈
    ══════════════════════════════════════ */
    function formatBirth(input) {
        var val = input.value.replace(/\D/g, '');
        if (val.length > 4) val = val.slice(0,4) + '-' + val.slice(4);
        if (val.length > 7) val = val.slice(0,7) + '-' + val.slice(7);
        input.value = val.slice(0, 10);
    }

    /* ══════════════════════════════════════
       우편번호
    ══════════════════════════════════════ */
    function openPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                document.getElementById('zipcode').value = data.zonecode;
                document.getElementById('address').value = data.roadAddress || data.jibunAddress;
                document.getElementById('addressDetail').focus();
            }
        }).open();
    }

    /* ══════════════════════════════════════
       유틸리티
    ══════════════════════════════════════ */
    function setMsg(id, text, isOk) {
        var el = document.getElementById(id);
        el.textContent = text;
        el.className = 'field-msg show ' + (isOk ? 'ok' : 'err');
    }
    function hideMsg(id) {
        var el = document.getElementById(id);
        el.textContent = '';
        el.className = 'field-msg';
    }

    /* ══════════════════════════════════════
       최종 submit 유효성 검사
    ══════════════════════════════════════ */
    function validateForm() {
        if (!idChecked) {
            showToast('아이디 중복확인을 완료해주세요.', 'error'); return false;
        }
        var pw  = document.getElementById('pw').value;
        var pw2 = document.getElementById('pw2').value;
        if (!/^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{}|;':",.<>?]).{8,}$/.test(pw)) {
            showToast('비밀번호 형식을 확인해주세요.', 'error'); return false;
        }
        if (pw !== pw2) {
            showToast('비밀번호가 일치하지 않습니다.', 'error'); return false;
        }
        if (!emailVerified) {
            showToast('이메일 인증을 완료해주세요.', 'error'); return false;
        }
        return true;
    }
</script>
</body>
