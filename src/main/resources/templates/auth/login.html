<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<div class="content-wrap">
    <div class="card">

        <h1 class="auth-title" style="text-align:center; margin-bottom: 40px;">로그인</h1>


        <!-- 로그인 실패 메시지 (Spring Security가 ?error 파라미터 추가) -->
        <div th:if="${param.error}" class="flash-msg">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <!-- 회원가입 완료 등 성공 메시지 (RedirectAttributes로 전달) -->
        <div th:if="${successMessage}" class="flash-msg flash-success" th:text="${successMessage}"></div>

        <!--
            POST /login 은 Spring Security가 처리 (SecurityConfig.loginProcessingUrl)
            usernameParameter = "user_id", passwordParameter = "password"
        -->
        <form th:action="@{/login}" method="post">
            <!-- CSRF 토큰: Thymeleaf + Spring Security 자동 삽입 -->

            <div class="input-group">
                <div class="input-row">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text"
                           name="user_id"
                           placeholder="아이디"
                           required
                           autocomplete="username">
                </div>
                <div class="input-row">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password"
                           name="password"
                           id="pw"
                           placeholder="비밀번호"
                           required
                           autocomplete="current-password">
                    <button type="button" onclick="togglePw()" aria-label="비밀번호 보기">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <label class="remember">
                <input type="checkbox" name="remember-me">
                <span>로그인 상태 유지</span>
            </label>

            <button type="submit" class="btn-login">로그인</button>
        </form>

        <div class="links">
            <a th:href="@{/find-id}">아이디 찾기</a>
            <span class="divider">|</span>
            <a th:href="@{/find-password}">비밀번호 찾기</a>
            <span class="divider">|</span>
            <a th:href="@{/register}">회원가입</a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
    function togglePw() {
        const pw = document.getElementById('pw');
        pw.type = pw.type === 'password' ? 'text' : 'password';
    }

</script>
</body>
</html>
