<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{mypage/mypage_base :: mypageLayout('결제 내역 - 티켓플로우', '결제 내역', 'benefits', ~{::content})}">
    <th:block th:fragment="content">

        <a th:href="@{/mypage/membership}" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
            멤버십 혜택으로 돌아가기
        </a>

        <th:block th:if="${payments != null and !#lists.isEmpty(payments)}">
            <table class="history-table">
                <thead>
                <tr>
                    <th>결제일</th>
                    <th>주문번호</th>
                    <th>금액</th>
                    <th>카드</th>
                    <th>상태</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${payments}">
                    <td th:text="${p.paidAt}"></td>
                    <td th:text="${p.orderId}"></td>
                    <td th:text="${p.amount} + '원'"></td>
                    <td th:text="${p.cardInfo}"></td>
                    <td><span th:class="'status-badge ' + ${p.statusClass}" th:text="${p.statusLabel}"></span></td>
                    <td>
                        <!-- 결제 완료 상태일 때만 환불 버튼 노출. PaymentViewDto에 paymentId가 없다면
                             환불 대상 식별을 위해 paymentId 필드를 추가해야 합니다. -->
                        <form th:if="${p.statusClass == 'paid'}"
                              th:action="@{/mypage/membership/payments/{id}/refund(id=${p.paymentId})}"
                              method="post"
                              onsubmit="return confirm('환불을 진행하시겠습니까? 환불 후에는 되돌릴 수 없습니다.');">
                            <button type="submit" class="btn-refund">환불 요청</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </th:block>

        <th:block th:if="${payments == null or #lists.isEmpty(payments)}">
            <div class="empty-state">
                <p>결제 내역이 없습니다.</p>
            </div>
        </th:block>

    </th:block>
</th:block>
</body>
</html>
