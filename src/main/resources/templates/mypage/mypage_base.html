<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:fragment="mypageLayout(pageTitle, headingTitle, activeMenu, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: '마이페이지 - 티켓플로우'">마이페이지 - 티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/mypage-dropdown.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<div class="page-header">
    <div class="page-header-inner">
        <h1 class="page-title" th:text="${headingTitle} ?: '마이페이지'">마이페이지</h1>
    </div>
</div>

<div class="layout">
    <aside>
        <nav class="side-nav">
            <a th:href="@{/mypage/benefits}"
               th:classappend="${activeMenu == 'benefits'} ? ' active'">
                마이페이지
                <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </a>
            <div class="side-nav-group"
                 th:classappend="${activeMenu == 'tickets' or activeMenu == 'membershipPayments'} ? ' open' : ''">
                <a th:href="@{/mypage/tickets}" class="side-nav-toggle"
                   th:classappend="${activeMenu == 'tickets' or activeMenu == 'membershipPayments'} ? ' active'">
                    결제내역
                    <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="m9 18 6-6-6-6"/>
                    </svg>
                </a>
                <div class="side-nav-submenu">
                    <a th:href="@{/mypage/tickets}"
                       th:classappend="${activeMenu == 'tickets'} ? ' active'">
                        티켓 예매 내역
                    </a>
                    <a th:href="@{/mypage/membership/payments}"
                       th:classappend="${activeMenu == 'membershipPayments'} ? ' active'">
                        멤버십 결제 내역
                    </a>
                </div>
            </div>
            <a th:href="@{/mypage/wishlist}"
               th:classappend="${activeMenu == 'wishlist'} ? ' active'">
                위시리스트
                <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </a>
            <a th:href="@{/mypage/coupons}"
               th:classappend="${activeMenu == 'coupons'} ? ' active'">
                쿠폰함
                <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </a>
            <a th:href="@{/mypage/profile}"
               th:classappend="${activeMenu == 'profile'} ? ' active'">
                회원정보 수정
                <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <th:block th:replace="${content}"></th:block>
    </main>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script>
    (function() {
        function fixMainWidth() {
            var layout = document.querySelector('.layout');
            var aside = document.querySelector('aside');
            var main = document.querySelector('.main-content');
            if (!layout || !aside || !main) return;

            var layoutWidth = layout.getBoundingClientRect().width;
            var layoutStyle = window.getComputedStyle(layout);
            var gap = parseFloat(layoutStyle.gap) || 32;
            var asideWidth = aside.getBoundingClientRect().width;
            var mainWidth = layoutWidth - asideWidth - gap;

            main.style.width = mainWidth + 'px';
            main.style.minWidth = mainWidth + 'px';
            main.style.maxWidth = mainWidth + 'px';
            main.style.flex = 'none';
        }
        document.addEventListener('DOMContentLoaded', fixMainWidth);
        window.addEventListener('resize', fixMainWidth);
    })();
</script>
</body>
</html>
