<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원정보 수정 - 티켓플로우</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<div class="page-header">
    <div class="page-header-inner">
        <h1 class="page-title">회원정보 수정</h1>
    </div>
</div>

<div class="layout">
    <aside>
        <nav class="side-nav">
            <a th:href="@{/mypage/benefits}">마이페이지 <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></a>
            <a th:href="@{/mypage/tickets}">티켓 예매 내역 <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></a>
            <a th:href="@{/mypage/wishlist}">위시리스트 <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></a>
            <a th:href="@{/mypage/coupons}">쿠폰함 <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></a>
            <a th:href="@{/mypage/profile}" class="active">회원정보 수정 <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="profile-card">
            <form th:action="@{/mypage/profile}" method="post">
                <div class="section-label">기본 정보</div>
                <div class="field">
                    <label>아이디</label>
                    <input type="text" th:value="${user['id']}" readonly>
                </div>
                <div class="field">
                    <label>이름</label>
                    <input type="text" th:value="${user['name']}" readonly>
                </div>
                <div class="field">
                    <label>이메일</label>
                    <input type="email" th:value="${user['email']}" readonly>
                </div>

                <div class="section-label" style="margin-top:32px;">비밀번호 변경</div>
                <div class="field">
                    <label>현재 비밀번호</label>
                    <input type="password" name="currentPassword" placeholder="현재 비밀번호를 입력하세요.">
                </div>
                <div class="field">
                    <label>새 비밀번호</label>
                    <input type="password" name="newPassword" placeholder="새 비밀번호를 입력하세요.">
                </div>
                <div class="field">
                    <label>새 비밀번호 확인</label>
                    <input type="password" name="newPasswordConfirm" placeholder="새 비밀번호를 다시 입력하세요.">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-withdraw" onclick="confirmWithdraw()">회원탈퇴</button>
                    <div class="action-right">
                        <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
                        <button type="submit" class="btn-save">저장하기</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
function confirmWithdraw() {
    if (confirm('정말 탈퇴하시겠습니까? 탈퇴 후 모든 데이터가 삭제됩니다.')) {
        window.location.href = '/mypage/withdraw';
    }
}
</script>
</body>
</html>
