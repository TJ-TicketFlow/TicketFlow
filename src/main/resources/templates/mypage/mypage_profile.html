<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{mypage/mypage_base :: mypageLayout('회원정보 수정 - 티켓플로우', '회원정보 수정', 'profile', ~{::content})}">
    <th:block th:fragment="content">

        <div th:if="${successMessage}" class="flash-msg flash-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="flash-msg" th:text="${errorMessage}"></div>

        <div class="profile-card">
            <form th:action="@{/mypage/profile}" method="post">

                <div class="section-label">기본 정보</div>
                <div class="field">
                    <label>아이디</label>
                    <input type="text" th:value="${user.userId}" readonly>
                </div>
                <div class="field">
                    <label>이름</label>
                    <input type="text" th:value="${user.userName}" readonly>
                </div>
                <div class="field">
                    <label>이메일</label>
                    <input type="email" th:value="${user.userEmail}" readonly>
                </div>

                <div class="section-label" style="margin-top:32px;">비밀번호 변경</div>
                <div class="field">
                    <label>현재 비밀번호</label>
                    <input type="password" name="currentPassword" placeholder="현재 비밀번호를 입력하세요." autocomplete="current-password">
                </div>
                <div class="field">
                    <label>새 비밀번호</label>
                    <input type="password" name="newPassword" placeholder="새 비밀번호를 입력하세요." autocomplete="new-password">
                </div>
                <div class="field">
                    <label>새 비밀번호 확인</label>
                    <input type="password" name="newPasswordConfirm" placeholder="새 비밀번호를 다시 입력하세요." autocomplete="new-password">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-withdraw" onclick="confirmWithdraw()">회원탈퇴</button>
                    <div class="action-right">
                        <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
                        <button type="submit" class="btn-save">저장하기</button>
                    </div>
                </div>
            </form>
        </div>

    </th:block>
</th:block>

<script>
    function confirmWithdraw() {
        if (confirm('정말 탈퇴하시겠습니까? 탈퇴 후 모든 데이터가 삭제됩니다.')) {
            window.location.href = '/mypage/withdraw';
        }
    }
</script>
</body>
</html>
